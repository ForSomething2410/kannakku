<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackRoad | Mobile Report</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --ink: #f3efe6;
            --ink-dim: #9b9488;
            --paper: #14130f;
            --paper-raised: #1c1a15;
            --line: #34302a;
            --rust: #c5622e;
            --moss: #6f8a5c;
            --mono: 'IBM Plex Mono', 'SFMono-Regular', Menlo, Consolas, monospace;
            --serif: 'Source Serif Pro', Georgia, 'Times New Roman', serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: var(--serif);
            background-color: var(--paper);
            background-image:
                linear-gradient(var(--line) 1px, transparent 1px);
            background-size: 100% 28px;
            color: var(--ink);
            margin: 0;
            padding: 28px 18px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
        }

        header {
            width: 100%;
            margin-bottom: 30px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }

        .brand-mark {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            color: var(--rust);
            text-transform: uppercase;
        }

        h1 {
            font-family: var(--serif);
            font-size: 30px;
            font-weight: 600;
            margin: 6px 0 0 0;
            letter-spacing: -0.3px;
            color: var(--ink);
        }

        p.subtitle {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.04em;
            color: var(--ink-dim);
            margin: 6px 0 0 0;
            text-transform: uppercase;
        }

        .section-label {
            font-family: var(--mono);
            font-size: 10px;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--rust);
            margin: 0 0 14px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--line);
        }

        .card {
            background: var(--paper-raised);
            padding: 22px;
            border: 1px solid var(--line);
            margin-bottom: 22px;
            position: relative;
        }

        .card::before {
            content: "";
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--rust);
        }

        label {
            display: block;
            font-family: var(--mono);
            font-size: 10.5px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--ink-dim);
            margin-bottom: 8px;
            margin-top: 18px;
        }

        label:first-of-type { margin-top: 0; }

        input[type="file"] {
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--ink);
            font-family: var(--mono);
            width: 100%;
        }

        input[type="file"]::file-selector-button {
            background: var(--paper);
            color: var(--ink);
            border: 1px solid var(--line);
            border-radius: 0;
            padding: 8px 12px;
            font-family: var(--mono);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-right: 10px;
            cursor: pointer;
        }

        input[type="date"], select {
            width: 100%;
            padding: 11px 12px;
            border-radius: 0;
            border: 1px solid var(--line);
            background: var(--paper);
            font-size: 14px;
            font-family: var(--mono);
            color: var(--ink);
            outline: none;
            transition: border-color 0.15s;
        }

        select option { background: var(--paper); color: var(--ink); }

        input:focus, select:focus {
            border-color: var(--rust);
        }

        select[multiple] {
            height: 110px;
        }

        .btn-group {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 0;
            border: 1px solid var(--line);
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.08s, opacity 0.2s, background 0.15s;
        }

        .btn-primary {
            background: var(--rust);
            color: #1a0f08;
            border-color: var(--rust);
        }

        .btn-secondary {
            background: transparent;
            color: var(--ink-dim);
            border-color: var(--line);
            font-weight: 500;
        }

        button:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--ink-dim);
            margin-right: 8px;
        }

        .active-dot { background: var(--moss); }

        #fileStatus {
            color: var(--ink-dim);
            font-family: var(--mono);
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <div class="brand-mark">Ledger / 01</div>
                <h1>BlackRoad</h1>
                <p class="subtitle">Minimal Report Generator</p>
            </div>
        </header>

        <p class="section-label">Source</p>
        <div class="card">
            <label>Data File</label>
            <input type="file" id="jsonFile" accept=".json">
            <div id="fileStatus" style="font-size: 12px; margin-top: 8px;">
                <span class="status-dot" id="dot"></span> No file loaded
            </div>
        </div>

        <p class="section-label">Filters</p>
        <div class="card">
            <label>Income Sources</label>
            <select id="income" multiple></select>

            <label>Expense Categories</label>
            <select id="category" multiple></select>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div>
                    <label>From</label>
                    <input type="date" id="fromDate">
                </div>
                <div>
                    <label>To</label>
                    <input type="date" id="toDate">
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-primary" onclick="generatePDF()">Generate PDF Report</button>
            <button class="btn-secondary" onclick="location.reload()">Clear All</button>
        </div>
    </div>

    <script>
        let data = [];

        document.getElementById("jsonFile").addEventListener("change", function() {
            let file = this.files[0];
            let reader = new FileReader();
            reader.onload = function(e) {
                try {
                    data = JSON.parse(e.target.result);
                    document.getElementById('dot').classList.add('active-dot');
                    document.getElementById('fileStatus').innerText = "File loaded successfully";
                    loadFilters();
                } catch(err) { alert("Invalid JSON format"); }
            };
            reader.readAsText(file);
        });

        function loadFilters() {
            let incomeSet = new Set();
            let catSet = new Set();
            data.forEach(r => {
                if(r.from) incomeSet.add(r.from);
                if(r.transactions) {
                    r.transactions.forEach(t => { if(t.category) catSet.add(t.category); });
                }
            });
            let income = document.getElementById("income");
            let category = document.getElementById("category");
            income.innerHTML = ""; category.innerHTML = "";
            incomeSet.forEach(v => income.options.add(new Option(v, v)));
            catSet.forEach(v => category.options.add(new Option(v, v)));
        }

        function getSelected(id) {
            return Array.from(document.getElementById(id).selectedOptions).map(o => o.value);
        }

        function generatePDF() {
            if (data.length === 0) return alert("Please upload a file first");

            const normalize = v => (v || "").toLowerCase().trim();
            const nameKeys = getSelected("income");
            const categoryKeys = getSelected("category");
            const fromDate = document.getElementById("fromDate").value;
            const toDate = document.getElementById("toDate").value;

            const fTime = fromDate ? new Date(fromDate).setHours(0,0,0,0) : null;
            const tTime = toDate ? new Date(toDate).setHours(23,59,59,999) : null;

            // Global logic
            let filteredRecords = data.filter(record => {
                const matchesName = nameKeys.length === 0 || nameKeys.some(k => normalize(record.from).includes(normalize(k)));
                const recordTime = new Date(record.date).getTime();
                const matchesDate = (!fTime || !tTime) || (recordTime >= fTime && recordTime <= tTime);
                return matchesName && matchesDate;
            });

            let globalIncome = 0, globalExpense = 0, categorySummary = {};

            filteredRecords.forEach(record => {
                globalIncome += parseFloat(record.income) || 0;
                (record.transactions || []).forEach(tr => {
                    if (categoryKeys.length === 0 || categoryKeys.some(k => normalize(tr.category).includes(normalize(k)))) {
                        const amt = parseFloat(tr.amount) || 0;
                        globalExpense += amt;
                        categorySummary[tr.category] = (categorySummary[tr.category] || 0) + amt;
                    }
                });
            });

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF("p", "mm", "a4");

            // Brand palette (matches the ledger UI)
            const RUST = [197, 98, 46];
            const INK = [20, 19, 15];
            const INK_DIM = [110, 104, 94];
            const PAPER_RAISED = [28, 26, 21];
            const LINE = [220, 213, 200];

            // PDF Styling & Rendering
            pdf.setFillColor(...INK);
            pdf.rect(0, 0, 210, 18, "F");
            pdf.setFillColor(...RUST);
            pdf.rect(0, 18, 210, 1.2, "F");
            pdf.setTextColor(243, 239, 230);
            pdf.setFont("courier", "bold");
            pdf.setFontSize(10);
            pdf.text("BLACKROAD REPORT", 15, 11);
            pdf.setFont("courier", "normal");
            pdf.setFontSize(8);
            pdf.text("LEDGER / 01", 180, 11, { align: "right" });

            let y = 34;
            pdf.setTextColor(...INK);
            pdf.setFont("times", "bold");
            pdf.setFontSize(22);
            pdf.text("Financial Summary", 15, y);

            y += 8;
            pdf.setFont("courier", "normal");
            pdf.setFontSize(9);
            pdf.setTextColor(...INK_DIM);
            pdf.text(`GENERATED ${new Date().toLocaleDateString().toUpperCase()}`, 15, y);

            y += 4;
            pdf.setDrawColor(...LINE);
            pdf.line(15, y, 195, y);

            y += 12;
            // Summary Table
            pdf.autoTable({
                startY: y,
                head: [['Description', 'Amount']],
                body: [
                    ['Total Income', globalIncome.toFixed(2)],
                    ['Total Expenses', globalExpense.toFixed(2)],
                    ['Net Balance', (globalIncome - globalExpense).toFixed(2)]
                ],
                theme: 'grid',
                styles: { font: 'courier', fontSize: 9, textColor: INK, lineColor: LINE },
                headStyles: { fillColor: INK, textColor: [243, 239, 230], font: 'courier', fontStyle: 'bold' }
            });

            y = pdf.lastAutoTable.finalY + 15;

            // Breakdown
            pdf.setFont("times", "bold");
            pdf.setFontSize(14);
            pdf.setTextColor(...INK);
            pdf.text("Expense by Category", 15, y);
            pdf.autoTable({
                startY: y + 5,
                head: [['Category', 'Amount']],
                body: Object.entries(categorySummary).map(([c, a]) => [c, a.toFixed(2)]),
                styles: { font: 'courier', fontSize: 9, textColor: INK, lineColor: LINE },
                headStyles: { fillColor: RUST, textColor: [26, 15, 8], font: 'courier', fontStyle: 'bold' }
            });

            // Individual Records (full transaction detail per record, always included)
            y = pdf.lastAutoTable.finalY + 20;
            filteredRecords.forEach(record => {
                let txs = (record.transactions || []).filter(tr => 
                    categoryKeys.length === 0 || categoryKeys.some(k => normalize(tr.category).includes(normalize(k)))
                );
                
                const recExp = txs.reduce((s, t) => s + (parseFloat(t.amount) || 0), 0);
                
                // Reserve enough room for the header band + both tables; otherwise start a fresh page
                const estHeight = 14 + (2 + txs.length) * 7;
                if (y + estHeight > 280) { pdf.addPage(); y = 20; }

                pdf.setFillColor(...PAPER_RAISED);
                pdf.rect(15, y - 5, 180, 7, "F");
                pdf.setFont("courier", "bold");
                pdf.setFontSize(9);
                pdf.setTextColor(243, 239, 230);
                pdf.text(`${record.date}  |  ${record.from}`, 17, y);

                y += 4;
                pdf.autoTable({
                    startY: y,
                    head: [['Income', 'Expenses', 'Balance']],
                    body: [[parseFloat(record.income).toFixed(2), recExp.toFixed(2), (record.income - recExp).toFixed(2)]],
                    styles: { font: 'courier', fontSize: 8, textColor: INK, lineColor: LINE },
                    headStyles: { fillColor: [80, 76, 68], textColor: [243, 239, 230], font: 'courier' },
                    margin: { left: 15 },
                    tableWidth: 90
                });

                // Transaction detail table — always rendered, with a fallback row when empty
                pdf.autoTable({
                    startY: pdf.lastAutoTable.finalY + 2,
                    head: [['Date', 'Category', 'Description', 'Amount']],
                    body: txs.length
                        ? txs.map(t => [t.date || record.date || '—', t.category || '—', t.description || '—', parseFloat(t.amount || 0).toFixed(2)])
                        : [['—', '—', 'No transactions in this filter', '—']],
                    theme: 'striped',
                    styles: { font: 'courier', fontSize: 8, textColor: INK, lineColor: LINE },
                    headStyles: { fillColor: RUST, textColor: [26, 15, 8], font: 'courier', fontStyle: 'bold' },
                    alternateRowStyles: { fillColor: [245, 241, 233] }
                });

                y = pdf.lastAutoTable.finalY + 15;
            });

            pdf.save("BlackRoad_Report.pdf");
        }
    </script>
</body>
</html>
